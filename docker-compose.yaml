version: '3.8'

services:
  inventario-db:
    image: postgres:15-alpine
    container_name: inventario-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: inventario_db
    networks:
      - origen-net
    volumes:
      - inventario_data:/var/lib/postgresql/data
      - ./inventario-service/migrations:/docker-entrypoint-initdb.d
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d inventario_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  inventario-service:
    build:
      context: ./inventario-service
      dockerfile: Dockerfile
    container_name: inventario-service
    environment:
      - DB_HOST=inventario-db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=inventario_db
      - DB_PORT=5432
      - PORT=50051
    networks:
      - origen-net
    depends_on:
      inventario-db:
        condition: service_healthy
    restart: on-failure
    # No ports mapped to host — only reachable within origen-net (§ architecture rules)

networks:
  origen-net:
    name: origen-net
    driver: bridge

volumes:
  inventario_data:
