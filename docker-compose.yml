services:
  # ----------------------------------------
  # BASES DE DATOS AISLADAS
  # ----------------------------------------
  notificaciones_db:
    image: postgres:15-alpine
    container_name: notificaciones_db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NOTIFICACIONES_NAME:-notificaciones_db}
    networks:
      - origen-net
    volumes:
      - notificaciones_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NOTIFICACIONES_NAME:-notificaciones_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    # No exponemos puertos al host según las reglas de arquitectura.
    # Internamente es accesible como 'notificaciones_db:5432'

  reservas_db:
    image: postgres:15-alpine
    container_name: reservas_db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_RESERVAS_NAME:-reservas_service}
    networks:
      - origen-net
    volumes:
      - reservas_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_RESERVAS_NAME:-reservas_service}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ----------------------------------------
  # MICROSERVICIOS
  # ----------------------------------------
  notification_service:
    build:
      context: ./notification_service
    container_name: notification_service
    environment:
      - PORT=50051
      - DB_HOST=notificaciones_db
      - DB_PORT=5432
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_NAME=${DB_NOTIFICACIONES_NAME:-notificaciones_db}
    networks:
      - origen-net
    depends_on:
      notificaciones_db:
        condition: service_healthy
    restart: unless-stopped
    # No exponemos el puerto 50051 al host. Será consumido internamente por gRPC.

  reservation_service:
    build:
      context: ./mi-servicio
    container_name: reservation_service
    ports:
      - "50051:50051"
    environment:
      - RESERVAS_DB_HOST=reservas_db
      - RESERVAS_DB_PORT=5432
      - RESERVAS_DB_USER=${DB_USER:-postgres}
      - RESERVAS_DB_PASSWORD=${DB_PASSWORD:-postgres}
      - RESERVAS_DB_NAME=${DB_RESERVAS_NAME:-reservas_service}
      - NOTIFICATION_SERVICE_HOST=notification_service:50051
      - INVENTORY_SERVICE_HOST=inventario_service:50051
    networks:
      - origen-net
    depends_on:
      reservas_db:
        condition: service_healthy
    restart: unless-stopped

  inventario_db:
    image: postgres:15-alpine
    container_name: inventario_db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: inventario_db
    networks:
      - origen-net
    volumes:
      - inventario_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d inventario_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  inventario_service:
    build:
      context: ./inventario-service
    container_name: inventario_service
    environment:
      - PORT=50051
      - DB_HOST=inventario_db
      - DB_PORT=5432
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_NAME=inventario_db
    networks:
      - origen-net
    depends_on:
      inventario_db:
        condition: service_healthy
    restart: unless-stopped

  api_gateway:
    build:
      context: ./api-gateway
    container_name: api_gateway
    ports:
      - "8080:8080"
    environment:
      - RESERVATION_SERVICE_HOST=reservation_service:50051
      - NOTIFICATION_SERVICE_HOST=notification_service:50051
      - INVENTORY_SERVICE_HOST=inventario_service:50051
    networks:
      - origen-net
    depends_on:
      - notification_service
      - reservation_service
      - inventario_service
    restart: unless-stopped

networks:
  origen-net:
    driver: bridge

volumes:
  notificaciones_data:
  reservas_data:
  inventario_data: